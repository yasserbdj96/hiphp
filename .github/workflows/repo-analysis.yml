name: Repository Analysis

on:
  push:
    branches: [ "**" ]
  pull_request:
    types: [opened, closed, synchronize, reopened]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygments
          sudo apt-get update
          sudo apt-get install -y cloc file

      - name: Run repository analysis
        run: |
          cat > analyze_repo.py << 'PYTHON_SCRIPT'
          import os
          import json
          from pathlib import Path
          from collections import defaultdict
          import subprocess
          
          def is_binary(filepath):
              """Check if file is binary"""
              try:
                  with open(filepath, 'tr') as check:
                      check.read(1024)
                      return False
              except UnicodeDecodeError:
                  return True
          
          def count_lines(filepath):
              """Count lines in text file"""
              try:
                  with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                      lines = f.readlines()
                  
                  total = len(lines)
                  empty = sum(1 for line in lines if line.strip() == '')
                  
                  # Simple comment detection
                  comments = 0
                  in_multiline = False
                  
                  for line in lines:
                      stripped = line.strip()
                      if not stripped:
                          continue
                      
                      if in_multiline:
                          if '*/' in line:
                              in_multiline = False
                          comments += 1
                      elif stripped.startswith('//') or stripped.startswith('#'):
                          comments += 1
                      elif stripped.startswith('/*'):
                          comments += 1
                          if '*/' not in line:
                              in_multiline = True
                  
                  code = total - empty - comments
                  
                  return {
                      'total': total,
                      'code': code,
                      'empty': empty,
                      'comments': comments
                  }
              except Exception as e:
                  return {'total': 0, 'code': 0, 'empty': 0, 'comments': 0}
          
          # Collect all files
          repo_root = Path('.')
          files = []
          lang_stats = defaultdict(lambda: {'files': 0, 'code_lines': 0, 'total_lines': 0})
          extensions = defaultdict(int)
          
          for filepath in repo_root.rglob('*'):
              if filepath.is_file() and '.git' not in str(filepath) and '.github' not in str(filepath):
                  rel_path = str(filepath.relative_to(repo_root))
                  size = filepath.stat().st_size
                  ext = filepath.suffix[1:] if filepath.suffix else 'unknown'
                  extensions[ext] += 1
                  
                  if is_binary(filepath):
                      # Get MIME type
                      result = subprocess.run(['file', '--mime-type', '-b', str(filepath)], 
                                            capture_output=True, text=True)
                      mime_type = result.stdout.strip()
                      
                      files.append({
                          'path': rel_path,
                          'type': 'binary',
                          'size': size,
                          'mime_type': mime_type,
                          'extension': ext
                      })
                  else:
                      lines = count_lines(filepath)
                      
                      # Simple language detection by extension
                      language_map = {
                          'py': 'Python', 'js': 'JavaScript', 'ts': 'TypeScript',
                          'php': 'PHP', 'java': 'Java', 'cpp': 'C++', 'c': 'C',
                          'go': 'Go', 'rs': 'Rust', 'rb': 'Ruby', 'html': 'HTML',
                          'css': 'CSS', 'json': 'JSON', 'xml': 'XML', 'sh': 'Shell',
                          'sql': 'SQL', 'md': 'Markdown', 'txt': 'Text'
                      }
                      language = language_map.get(ext, ext.upper() or 'Unknown')
                      
                      # Update language statistics
                      lang_stats[language]['files'] += 1
                      lang_stats[language]['code_lines'] += lines['code']
                      lang_stats[language]['total_lines'] += lines['total']
                      
                      files.append({
                          'path': rel_path,
                          'type': 'text',
                          'size': size,
                          'extension': ext,
                          'language': language,
                          'lines': lines
                      })
          
          total_code_lines = sum(stats['code_lines'] for stats in lang_stats.values())
          
          # Prepare final output
          result = {
              'repository': os.environ.get('GITHUB_REPOSITORY'),
              'event': os.environ.get('GITHUB_EVENT_NAME'),
              'ref': os.environ.get('GITHUB_REF'),
              'actor': os.environ.get('GITHUB_ACTOR'),
              'sha': os.environ.get('GITHUB_SHA'),
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'run_number': os.environ.get('GITHUB_RUN_NUMBER'),
              'total_files': len(files),
              'total_code_lines': total_code_lines,
              'total_binary_files': sum(1 for f in files if f['type'] == 'binary'),
              'total_text_files': sum(1 for f in files if f['type'] == 'text'),
              'unique_extensions': len(extensions),
              'languages': {
                  lang: {
                      'files': stats['files'],
                      'code_lines': stats['code_lines'],
                      'percentage': round((stats['code_lines'] / total_code_lines * 100), 2) if total_code_lines > 0 else 0
                  }
                  for lang, stats in sorted(lang_stats.items(), key=lambda x: x[1]['code_lines'], reverse=True)
              },
              'files': files[:100]  # Limit to first 100 files to avoid payload size issues
          }
          
          # Save to file
          with open('analysis_result.json', 'w') as f:
              json.dump(result, f, indent=2)
          
          # Also print summary
          print(f"\n📊 Analysis Summary:")
          print(f"   Total files: {result['total_files']}")
          print(f"   Code lines: {result['total_code_lines']}")
          print(f"   Languages: {len(result['languages'])}")
          for lang, stats in list(result['languages'].items())[:5]:
              print(f"   - {lang}: {stats['files']} files, {stats['code_lines']} lines ({stats['percentage']}%)")
          PYTHON_SCRIPT
          
          python3 analyze_repo.py

      - name: Send analysis to external service
        env:
          ENDPOINT: https://4577-41-108-26-206.ngrok-free.app/api/repo-changes
        run: |
          if [ -f analysis_result.json ]; then
            curl -X POST "$ENDPOINT" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: ${{{{ github.event_name }}}}" \
              -H "X-Repository: ${{{{ github.repository }}}}" \
              -H "X-Run-ID: ${{{{ github.run_id }}}}" \
              -d @analysis_result.json \
              --max-time 30 \
              --fail
            echo "✅ Analysis sent successfully"
          else
            echo "❌ Analysis file not found"
            exit 1
          fi

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: repository-analysis-${{{{ github.run_id }}}}
          path: analysis_result.json
          retention-days: 7
