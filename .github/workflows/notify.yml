name: Notify

on:
  push:
    branches: [ "**" ]
  pull_request:
    types: [opened, closed, synchronize, reopened]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to external service
        env:
          ENDPOINT: https://4577-41-108-26-206.ngrok-free.app/api/repo-changes
        run: |
          jq -n             --arg repo "${{ github.repository }}"             --arg event "${{ github.event_name }}"             --arg ref "${{ github.ref }}"             --arg actor "${{ github.actor }}"             --arg sha "${{ github.sha }}"             --arg run_id "${{ github.run_id }}"             '{"repository":$repo, "event":$event, "ref":$ref, "actor":$actor, "sha":$sha, "run_id":$run_id}' |           curl -X POST "$ENDPOINT"             -H "Content-Type: application/json"             -H "X-GitHub-Event: ${{ github.event_name }}"             -H "X-Repository: ${{ github.repository }}"             -d @-
